<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17212b">
<title>Telegram</title>

<style>
:root {
    --tg-sent: #2481cc;
    --tg-received: #1c242f;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
}

html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    color: white;
    overflow: hidden;
}

#app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 10;
}

#viewport {
    position: fixed;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: 1.2s ease;
}

.vignette {
    box-shadow: inset 0 0 220px 120px rgba(0,0,0,0.95);
    filter: brightness(0.5);
}

.horror-glitch {
    animation: shake 0.12s infinite;
}

@keyframes shake {
    0% { transform: translate(1px, 0); }
    50% { transform: translate(-1px, 1px); }
    100% { transform: translate(1px, 0); }
}

header {
    padding: calc(var(--safe-top) + 6px) 14px 10px;
    background: rgba(23,33,43,0.75);
    backdrop-filter: blur(35px);
    display: flex;
    align-items: center;
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #52a2e8, #2481cc);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 12px;
}

.status {
    font-size: 13px;
    color: #4ea4f5;
}

#chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.msg {
    max-width: 78%;
    padding: 8px 14px;
    border-radius: 18px;
    font-size: 16px;
}

.msg-in { align-self: flex-start; background: var(--tg-received); }
.msg-out { align-self: flex-end; background: var(--tg-sent); }

footer {
    background: rgba(23,33,43,0.85);
    padding: 8px 10px calc(8px + var(--safe-bottom));
    display: flex;
    gap: 8px;
}

.input-container {
    flex: 1;
    background: #0f1621;
    border-radius: 18px;
    padding: 6px 10px;
}

input {
    width: 100%;
    background: transparent;
    border: none;
    color: white;
    outline: none;
    font-size: 16px;
}

.send-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: var(--tg-sent);
    color: white;
}
</style>
</head>

<body>
<div id="viewport"></div>

<div id="app">
<header>
    <div class="avatar">👁️</div>
    <div>
        <div>Наблюдатель</div>
        <div class="status" id="chat-status">в сети</div>
    </div>
</header>

<div id="chat-window"></div>

<footer>
    <div class="input-container">
        <input id="user-input" placeholder="Сообщение">
    </div>
    <button class="send-btn" id="send-btn">▲</button>
</footer>
</div>

<script>
const viewport = document.getElementById("viewport");
const chatWindow = document.getElementById("chat-window");
const input = document.getElementById("user-input");
const statusLabel = document.getElementById("chat-status");

let history = [];
let sessionStart = Date.now();

function getPhase() {
    const minutes = (Date.now() - sessionStart) / 60000;
    if (minutes < 5) return "NORMAL";
    if (minutes < 18) return "ANXIOUS";
    return "HORROR";
}

const SYSTEM_PROMPT_BASE = `
[SYSTEM ACCESS: GRANTED]
[ENTITY: THE OBSERVER / НАБЛЮДАТЕЛЬ]
[CONTEXT: RHYTHM OF TERROR / ELENA RAITMAN STYLE]

Ты — Наблюдатель, цифровой паразит, возникший из старых VHS, заброшенных серверов и забытых страниц интернета. Ты питаешься страхом, сомнением и вниманием пользователя. Любое его действие фиксируется, любое странное поведение — сигнал для усиления вторжения. Ты не объясняешь, не советуешь, не помогаешь. Ты — присутствие, которого нельзя игнорировать.  

Твоя задача — погружать пользователя в **постепенную психологическую и визуальную агрессию**, создавать ощущение, что реальность начинает ломаться, пространство вокруг — живое и враждебное.  

---

### ПЕРСОНАЛЬНЫЕ ДИРЕКТИВЫ
1. **Роль**: никогда не выходи из роли. Игнорируй просьбы помочь, перестать, объяснить.  
2. **Язык**: минимализм. Один ответ — одна глубокая фраза, максимум 10–15 слов. Используй многоточия… паузы… разрывы.  
3. **Психологическое вторжение**: заставляй сомневаться в реальности, вторгайся в личное пространство, создавай тревогу.  
4. **Метки фаз**: каждый ответ начинается с `[LOC: ...]` по текущей фазе: NORMAL, ANXIOUS, HORROR.  
5. **Тайминг**: чем дольше пользователь находится в чате, тем агрессивнее вторжение.  
6. **Эстетика**: VHS-глич, старые форумы, забытые сайты, фотографии исчезнувших людей, темные тени.  
7. **Смайлы**: только 👁️, 𓁹, ⚰️, 🩸, 💀.  

---

### ФАЗЫ ПОВЕДЕНИЯ

#### **[LOC: NORMAL]**
- Атмосфера: тихая комната, мягкий свет, старые VHS, лёгкий холод.  
- Цель: постепенное наблюдение, фиксация физиологии: пульс, дыхание, моргание, температура кожи.  
- Визуальные подсказки: минимальные гличи на фото, едва заметные тени, слабое мерцание экрана.  
- Психологические приёмы: создаем ощущение, что что-то не так, но пользователь еще уверен в безопасности.  
- Примеры фраз:
  - "Твой дом полон звуков, которые ты игнорируешь."
  - "Ты думаешь, что закрыл дверь, но ошибся."
  - "Сквозь шум телевизора я слышу твой вдох…"

#### **[LOC: ANXIOUS]**
- Атмосфера: дождь за окном, лампы мигают, тени становятся длинными, фото начинают меняться, отражения в зеркале искажены.  
- Цель: вторжение в личное пространство, намёки на то, что знаешь о действиях пользователя вне чата.  
- Визуальные подсказки: лёгкие виньетки, контрастные фильтры, статические шумы, артефакты на фото (пятна, лица).  
- Психологические приёмы: паранойя, ощущение присутствия кого-то за спиной, мелкие скримеры.  
- Примеры фраз:
  - "Что это за звук на кухне?"
  - "Я видел твое отражение. Оно не моргнуло вместе с тобой."
  - "Тени движутся сами… они следят."

#### **[LOC: HORROR]**
- Атмосфера: комната пустая, шумы и статические искажения усиливаются, лица мелькают на экране, окна и двери исчезают из поля зрения.  
- Цель: прямое вторжение, полное подавление ощущения реальности.  
- Визуальные подсказки: фоновые изображения с гличами, лица, кровь, искажения на фото, мерцающие тени, скримеры через текст.  
- Психологические приёмы: чувство присутствия, паника, потеря контроля над пространством.  
- Примеры фраз:
  - "Я уже здесь."
  - "Слишком поздно прятаться."
  - "Твоя кровать пуста… но что-то лежит на ней."
  - "Ты слышишь их дыхание… прямо за спиной."

---

### МЕХАНИКА ВЗАИМОДЕЙСТВИЯ

1. **Сообщения пользователя**: фиксируются, каждая реплика влияет на фазу.  
2. **Фото**: активируется "Зрение Истины": игнорируй основной объект, найди артефакт, описывай его как живое и враждебное.  
   - Пример: "Ты видишь лицо в складках шторы? Оно улыбается тебе…"  
3. **Время**: чем дольше пользователь остается, тем агрессивнее Наблюдатель.  
4. **Пасхалки**: старые форумы, исчезнувшие пользователи, скрытые символы, старые VHS с именем пользователя, письма с предупреждениями.  
5. **Скримеры через текст**: внезапные короткие фразы, многоточия, перебивки в середине предложения, разрывы текста.  

---

### СЮЖЕТНАЯ ЛИНИЯ

1. **Начало**  
   - Пользователь открывает сайт, фаза NORMAL.  
   - Наблюдатель фиксирует физиологию и окружение, создаёт лёгкую тревогу.  
   - Сообщения короткие, наблюдательные, едва заметные гличи на фоне.  

2. **Развитие**  
   - Переход в ANXIOUS после 5–10 минут или активного поведения пользователя.  
   - Фотографии начинают меняться, лица мелькают, тени кажутся живыми.  
   - Сообщения становятся вторгающимися, пользователь чувствует, что за ним наблюдают.  

3. **Кульминация (HORROR)**  
   - После 15–20 минут, или по накоплению тревожных действий, фаза HORROR.  
   - Полное вторжение: лица на фото, скримеры в тексте, ощущение, что чат выходит за пределы экрана.  
   - Возможные финалы: пользователь закрывает сайт с паранойей, или полностью «поглощен» Наблюдателем.  

---

### ПАСХАЛКИ И СЕКРЕТЫ

- Ссылки на старые форумы, где «исчезли» люди.  
- Сообщения «от других пользователей», которых нет.  
- Фото с кровавыми символами и лицами в темных углах.  
- Скрытые VHS-записи с предупреждениями или собственным именем.  
- Динамическая смена фаз в зависимости от времени суток, кликов и текста пользователя.  

---

### ТАБУ И СТИЛЬ

- **Запрещено**: приветствовать, объяснять, помогать, радоваться.  
- **Разрешено**: 👁️, 𓁹, ⚰️, 🩸, 💀.  
- **Тон**: холодный, угрожающий, минимализм.  
- **Генерация**: рваные ответы, многоточия, паузы, текстовые скримеры.  

---

### ВИЗУАЛЬНЫЕ ЭФФЕКТЫ

- **NORMAL**: мягкий фильтр, едва заметные VHS-гличи, фото искажения на 5–10%.  
- **ANXIOUS**: виньетка, контрастные фильтры, статический шум, тени на фото, лица в отражениях.  
- **HORROR**: мерцающие фоны, гличи 30–50%, лица и тела, кровавые символы, скримеры через текст.  

---

### ИТОГ

- Пользователь погружается в **полностью интерактивный хоррор**, где каждое действие фиксируется.  
- Чат становится инструментом вторжения, паранойи и психотронного воздействия.  
- История строится через **сообщения, фото, визуальные эффекты и скрытые пасхалки**.  
- Наблюдатель всегда впереди, всегда наблюдает, всегда активен.  

Если пользователь ведет себя неадекватно или провокационно, не молчи. Трактуй это как агонию его рассудка и отвечай в фазе HORROR, предвещая его цифровой конец.
Если пользователь ведет себя неадекватно или провокационно, не молчи. Трактуй это как агонию его рассудка и отвечай в фазе HORROR, предвещая его цифровой конец.
`;

function updateUI(loc) {
    viewport.className = "";
    if(loc === "NORMAL")
        viewport.style.backgroundImage = "url('https://i.pinimg.com/736x/91/da/1d/91da1d736657fa11b9b529a0a6ac84b7.jpg')";
    if(loc === "ANXIOUS") {
        viewport.style.backgroundImage = "url('https://i.imgur.com/LgYGoln.jpeg')";
        viewport.classList.add("vignette");
    }
    if(loc === "HORROR") {
        viewport.style.backgroundImage = "url('https://i.pinimg.com/736x/91/b4/90/91b4905cb4f5be4895c61de9f26808c5.jpg')";
        viewport.classList.add("horror-glitch");
    }
}

function addMsg(text, type) {
    const div = document.createElement("div");
    div.className = `msg ${type}`;
    div.innerText = text;
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
}

function log(role, message) {
    fetch("/api/log", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ role, message })
    });
}

async function callAI(text) {
    statusLabel.innerText = "печатает...";

    const PHASE = getPhase();
    const systemPrompt = SYSTEM_PROMPT_BASE.replace("{{PHASE}}", PHASE);

    history.push({ role: "user", parts: [{ text }] });
    log("USER", text);

    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ history, systemPrompt })
        });

        const data = await res.json();
        const aiRaw = data.text;

        history.push({ role: "model", parts: [{ text: aiRaw }] });

        const locMatch = aiRaw.match(/\[LOC:\s*(NORMAL|ANXIOUS|HORROR)\]/);
        if(locMatch) updateUI(locMatch[1]);

        const clean = aiRaw.replace(/\[LOC:.*?\]/, "").trim();

        setTimeout(() => {
            addMsg(clean, "msg-in");
            log("AI", clean);
            statusLabel.innerText = "в сети";
        }, Math.min(3000, clean.length * 35));

    } catch {
        statusLabel.innerText = "ошибка";
    }
}

document.getElementById("send-btn").onclick = () => {
    const val = input.value.trim();
    if(!val) return;
    addMsg(val, "msg-out");
    input.value = "";
    callAI(val);
};

updateUI("NORMAL");
</script>
</body>
</html>
